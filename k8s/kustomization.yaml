apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml

# Argo CD Image Updater rewrites newTag here (git write-back) whenever a new
# image lands in ghcr.io; Argo CD then syncs the change like any other commit.
images:
  - name: lildeploy
    newName: ghcr.io/luis-pabon-tf/argocd-lildeploy
    newTag: "0.1.1"
