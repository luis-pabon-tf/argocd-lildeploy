apiVersion: apps/v1
kind: Deployment
metadata:
  name: lildeploy
  labels:
    app: lildeploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lildeploy
  template:
    metadata:
      labels:
        app: lildeploy
    spec:
      containers:
        - name: lildeploy
          # Image is sideloaded into kind via `kind load docker-image`;
          # IfNotPresent prevents Kubernetes from trying to pull it from a registry.
          image: lildeploy:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
