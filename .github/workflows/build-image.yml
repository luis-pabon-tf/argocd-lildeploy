name: build-image

# paths filter is load-bearing: Image Updater's write-back commits touch only
# k8s/, so they must not trigger a rebuild (infinite build loop otherwise).
on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:0.1.${{ github.run_number }}
