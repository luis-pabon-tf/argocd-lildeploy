apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: lildeploy
  namespace: argocd
spec:
  writeBackConfig:
    method: "git:secret:argocd/git-creds"
    gitConfig:
      branch: main
      writeBackTarget: kustomization
  applicationRefs:
    - namePattern: lildeploy
      images:
        - alias: lildeploy
          imageName: ghcr.io/luis-pabon-tf/argocd-lildeploy
          commonUpdateSettings:
            updateStrategy: semver
